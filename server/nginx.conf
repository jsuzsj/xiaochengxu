# 部署示例：Nginx 反代 NestJS + 托管后台静态 + 图片
# 需配合 HTTPS 证书（小程序要求 HTTPS + ICP 备案）
# 替换 your-domain.com 与证书路径

server {
  listen 443 ssl http2;
  server_name your-domain.com;

  ssl_certificate     /etc/ssl/certs/your-domain.crt;
  ssl_certificate_key /etc/ssl/private/your-domain.key;

  client_max_body_size 10m; # 图片上传上限

  # 后台前端（admin/dist 静态托管）
  location /admin/ {
    alias /opt/app/admin/dist/;
    try_files $uri $uri/ /admin/index.html;
  }
  location = /admin {
    return 301 /admin/;
  }

  # 上传图片静态
  location /uploads/ {
    alias /opt/app/server/uploads/;
    expires 7d;
  }

  # API 反代到 NestJS（保留 /api 前缀）
  location /api/ {
    proxy_pass http://127.0.0.1:9800;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# HTTP -> HTTPS
server {
  listen 80;
  server_name your-domain.com;
  return 301 https://$host$request_uri;
}
